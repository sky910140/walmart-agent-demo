name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Run unit and integration tests with coverage
        env:
          PYTHONPATH: src
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report --fail-under=80

      - name: Run retrieval regression evaluation
        run: python -m finagent eval-retrieval

      - name: Verify golden answers and checked-in data
        run: |
          python -m finagent eval-golden
          python -m finagent data-integrity
          python -m finagent offline-demo
